<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 360" fill="none">
  <!-- Background -->
  <rect width="580" height="360" rx="8" fill="#1e1e1e"/>

  <!-- Title -->
  <text x="290" y="28" text-anchor="middle" fill="#ddd" font-size="13" font-family="system-ui" font-weight="600">WSL 2 架构：Windows + Linux 混合开发</text>

  <!-- Windows Layer -->
  <rect x="20" y="45" width="540" height="90" rx="8" fill="#0078d4" opacity="0.15"/>
  <rect x="20" y="45" width="540" height="28" rx="8" fill="#0078d4" opacity="0.25"/>
  <rect x="20" y="65" width="540" height="8" fill="#0078d4" opacity="0.15"/>
  <text x="36" y="64" fill="#0078d4" font-size="12" font-family="system-ui" font-weight="600">🪟 Windows 10/11 宿主机</text>

  <!-- Windows items -->
  <rect x="40" y="85" width="150" height="36" rx="6" fill="#fff" opacity="0.9"/>
  <text x="52" y="100" fill="#333" font-size="10" font-family="system-ui">📁 C:\Users\dev\</text>
  <text x="52" y="114" fill="#888" font-size="9" font-family="system-ui">Windows 文件系统</text>

  <rect x="210" y="85" width="150" height="36" rx="6" fill="#fff" opacity="0.9"/>
  <text x="222" y="100" fill="#333" font-size="10" font-family="system-ui">⚙ VS Code for Windows</text>
  <text x="222" y="114" fill="#888" font-size="9" font-family="system-ui">本地 UI + 扩展</text>

  <rect x="380" y="85" width="160" height="36" rx="6" fill="#fff" opacity="0.9"/>
  <text x="392" y="100" fill="#333" font-size="10" font-family="system-ui">🌐 Windows 网络</text>
  <text x="392" y="114" fill="#888" font-size="9" font-family="system-ui">localhost:3000 → WSL</text>

  <!-- Arrow between layers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#888"/>
    </marker>
  </defs>
  <line x1="290" y1="135" x2="290" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- WSL Layer -->
  <rect x="20" y="155" width="540" height="90" rx="8" fill="#ffb900" opacity="0.12"/>
  <rect x="20" y="155" width="540" height="28" rx="8" fill="#ffb900" opacity="0.2"/>
  <rect x="20" y="175" width="540" height="8" fill="#ffb900" opacity="0.12"/>
  <text x="36" y="174" fill="#ffb900" font-size="12" font-family="system-ui" font-weight="600">🐧 WSL 2 虚拟机（轻量 Hyper-V）</text>

  <!-- WSL items -->
  <rect x="40" y="195" width="150" height="36" rx="6" fill="#fff" opacity="0.9"/>
  <text x="52" y="210" fill="#333" font-size="10" font-family="system-ui">📁 /home/dev/project/</text>
  <text x="52" y="224" fill="#888" font-size="9" font-family="system-ui">Linux 文件系统</text>

  <rect x="210" y="195" width="150" height="36" rx="6" fill="#fff" opacity="0.9"/>
  <text x="222" y="210" fill="#333" font-size="10" font-family="system-ui">🛠 VS Code Server</text>
  <text x="222" y="224" fill="#888" font-size="9" font-family="system-ui">远程 – WSL 扩展</text>

  <rect x="380" y="195" width="160" height="36" rx="6" fill="#fff" opacity="0.9"/>
  <text x="392" y="210" fill="#333" font-size="10" font-family="system-ui">🐳 Docker 引擎</text>
  <text x="392" y="224" fill="#888" font-size="9" font-family="system-ui">运行在 WSL 2 中</text>

  <!-- Arrow -->
  <line x1="290" y1="245" x2="290" y2="265" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- WSL Kernel Layer -->
  <rect x="20" y="265" width="540" height="80" rx="8" fill="#e74856" opacity="0.12"/>
  <rect x="20" y="265" width="540" height="28" rx="8" fill="#e74856" opacity="0.2"/>
  <rect x="20" y="285" width="540" height="8" fill="#e74856" opacity="0.12"/>
  <text x="36" y="284" fill="#e74856" font-size="12" font-family="system-ui" font-weight="600">💾 WSL 2 Linux 内核（完整系统调用）</text>

  <text x="42" y="310" fill="#888" font-size="10" font-family="system-ui">文件系统 ext4 | 网络桥接 | GPU 加速（CUDA/DirectML）</text>
  <text x="42" y="328" fill="#888" font-size="10" font-family="system-ui">配置 .wslconfig 限制内存/CPU：memory=8GB | processors=4</text>

  <!-- Workflow tip -->
  <g transform="translate(20, 345)">
    <text x="0" y="10" fill="#6a9955" font-size="10" font-family="system-ui">💡 最佳实践：项目文件放在 WSL Linux 文件系统内，避免跨 /mnt/c/ 访问性能损失</text>
  </g>
</svg>
