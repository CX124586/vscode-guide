<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <rect width="800" height="520" rx="8" fill="currentColor" class="text-white dark:text-[#1e1e1e]" opacity="0"/>
  <!-- Title Bar -->
  <rect x="0" y="0" width="800" height="36" rx="8" fill="#3c3c3c"/>
  <rect x="0" y="20" width="800" height="16" fill="#3c3c3c"/>
  <circle cx="16" cy="18" r="5" fill="#ff5f56"/>
  <circle cx="32" cy="18" r="5" fill="#ffbd2e"/>
  <circle cx="48" cy="18" r="5" fill="#27c93f"/>
  <text x="400" y="23" text-anchor="middle" fill="#bbb" font-size="11" font-family="system-ui">Visual Studio Code</text>

  <!-- Activity Bar -->
  <rect x="0" y="36" width="48" height="484" fill="#333"/>
  <rect x="0" y="36" width="48" height="2" fill="#007acc"/>
  <g transform="translate(12, 56)">
    <rect x="0" y="0" width="24" height="24" rx="4" fill="#fff" opacity="0.9"/>
    <path d="M4 7l3-3 3 3M4 17l3 3 3-3" stroke="#333" stroke-width="1.5" fill="none"/>
    <line x1="7" y1="10" x2="7" y2="14" stroke="#333" stroke-width="1.5"/>
  </g>
  <g transform="translate(12, 94)">
    <circle cx="12" cy="12" r="7" stroke="#888" stroke-width="1.5" fill="none"/>
    <line x1="17" y1="17" x2="21" y2="21" stroke="#888" stroke-width="1.5"/>
  </g>
  <g transform="translate(12, 132)">
    <rect x="3" y="7" width="18" height="3" rx="1.5" fill="#888"/>
    <rect x="3" y="13" width="18" height="3" rx="1.5" fill="#888"/>
  </g>

  <!-- Sidebar -->
  <rect x="48" y="36" width="220" height="450" fill="#252526"/>
  <rect x="48" y="36" width="220" height="35" fill="#2d2d2d"/>
  <text x="60" y="58" fill="#ccc" font-size="12" font-family="system-ui" font-weight="600">文件资源管理器</text>
  <rect x="248" y="36" width="20" height="35" fill="#252526"/>

  <!-- Sidebar content - file tree -->
  <g transform="translate(60, 85)" fill="#ccc" font-size="12" font-family="system-ui">
    <rect x="-12" y="-2" width="200" height="20" rx="3" fill="#37373d"/>
    <text x="0" y="12" fill="#ddd">📁 project</text>
    <text x="20" y="34">📁 src</text>
    <text x="40" y="54">📄 app.tsx</text>
    <text x="40" y="72">📄 index.ts</text>
    <text x="20" y="92">📁 public</text>
    <text x="40" y="112">📄 index.html</text>
    <text x="20" y="132">📄 package.json</text>
    <text x="20" y="152">📄 tsconfig.json</text>
  </g>

  <!-- Editor Area -->
  <rect x="268" y="36" width="532" height="450" fill="#1e1e1e"/>

  <!-- Tab Bar -->
  <rect x="268" y="36" width="532" height="35" fill="#252526"/>
  <rect x="268" y="36" width="160" height="35" fill="#1e1e1e"/>
  <text x="284" y="58" fill="#ddd" font-size="12" font-family="system-ui">app.tsx</text>
  <rect x="428" y="46" width="80" height="25" fill="#2d2d2d" rx="3"/>
  <text x="440" y="63" fill="#888" font-size="12" font-family="system-ui">index.ts</text>

  <!-- Editor Content -->
  <g transform="translate(280, 90)" font-family="monospace" font-size="11">
    <text x="0" y="12" fill="#858585">1</text>
    <text x="0" y="28" fill="#858585">2</text>
    <text x="0" y="44" fill="#858585">3</text>
    <text x="0" y="60" fill="#858585">4</text>
    <text x="0" y="76" fill="#858585">5</text>
    <text x="0" y="92" fill="#858585">6</text>
    <text x="0" y="108" fill="#858585">7</text>
    <text x="0" y="124" fill="#858585">8</text>
    <text x="0" y="140" fill="#858585">9</text>

    <text x="28" y="12" fill="#c586c0">import</text>
    <text x="60" y="12" fill="#9cdcfe">React</text>
    <text x="76" y="12" fill="#c586c0">from</text>
    <text x="92" y="12" fill="#ce9178">'react'</text>

    <text x="28" y="28" fill="#c586c0">import</text>
    <text x="60" y="28" fill="#9cdcfe">{'{ useState }'}</text>
    <text x="106" y="28" fill="#c586c0">from</text>
    <text x="122" y="28" fill="#ce9178">'react'</text>

    <text x="28" y="60" fill="#c586c0">function</text>
    <text x="84" y="60" fill="#dcdcaa">App</text>
    <text x="108" y="60" fill="#d4d4d4">()</text>
    <text x="116" y="60" fill="#d4d4d4">{'{'}</text>

    <text x="52" y="76" fill="#c586c0">const</text>
    <text x="84" y="76" fill="#4ec9b0">[count, setCount]</text>
    <text x="156" y="76" fill="#d4d4d4">=</text>
    <text x="164" y="76" fill="#dcdcaa">useState</text>
    <text x="188" y="76" fill="#d4d4d4">(0)</text>

    <text x="52" y="92" fill="#c586c0">return</text>
    <text x="84" y="92" fill="#d4d4d4">(</text>

    <text x="76" y="108" fill="#d4d4d4">&lt;div&gt;</text>
    <rect x="164" y="103" width="2" height="14" fill="#007acc" opacity="0.5"/>

    <text x="100" y="124" fill="#d4d4d4">{'{count}'}</text>

    <text x="76" y="140" fill="#d4d4d4">&lt;/div&gt;</text>
  </g>

  <!-- Cursor -->
  <rect x="444" y="193" width="2" height="14" fill="#aeafad" opacity="0.8"/>

  <!-- Panel (bottom) -->
  <rect x="0" y="486" width="800" height="34" fill="#252526"/>
  <rect x="0" y="486" width="800" height="34" fill="#007acc" opacity="0.1"/>
  <rect x="12" y="495" width="60" height="18" rx="3" fill="#007acc"/>
  <text x="18" y="508" fill="#fff" font-size="10" font-family="system-ui">终端</text>
  <text x="84" y="508" fill="#888" font-size="10" font-family="system-ui">调试控制台</text>
  <text x="172" y="508" fill="#888" font-size="10" font-family="system-ui">问题</text>

  <!-- Status Bar -->
  <rect x="0" y="502" width="800" height="18" fill="#007acc"/>
  <text x="10" y="515" fill="#fff" font-size="10" font-family="system-ui">main*</text>
  <text x="60" y="515" fill="#fff" font-size="10" font-family="system-ui">✕ 0 △ 1</text>
  <text x="150" y="515" fill="#fff" font-size="10" font-family="system-ui">UTF-8</text>
  <text x="200" y="515" fill="#fff" font-size="10" font-family="system-ui">TypeScript</text>
  <text x="750" y="515" fill="#fff" font-size="10" font-family="system-ui" text-anchor="end">Ln 6, Col 32</text>

  <!-- Legends -->
  <g transform="translate(60, 540)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#252526"/>
    <text x="18" y="10" fill="#888" font-size="10" font-family="system-ui">侧边栏</text>

    <rect x="100" y="0" width="12" height="12" rx="2" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
    <text x="118" y="10" fill="#888" font-size="10" font-family="system-ui">编辑器</text>

    <rect x="180" y="0" width="12" height="12" rx="2" fill="#333"/>
    <text x="198" y="10" fill="#888" font-size="10" font-family="system-ui">活动栏</text>

    <rect x="260" y="0" width="12" height="12" rx="2" fill="#007acc"/>
    <text x="278" y="10" fill="#888" font-size="10" font-family="system-ui">状态栏</text>
  </g>
</svg>
