<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" fill="none">
  <!-- Window background -->
  <rect x="10" y="10" width="500" height="380" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <rect x="10" y="10" width="500" height="36" rx="8" fill="#f0f0f0"/>
  <rect x="10" y="28" width="500" height="18" fill="#f0f0f0"/>
  <text x="260" y="32" text-anchor="middle" fill="#333" font-size="11" font-family="system-ui" font-weight="600">Visual Studio Code 安装程序</text>
  <circle cx="28" cy="28" r="5" fill="#e81123"/>
  <circle cx="44" cy="28" r="5" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
  <circle cx="60" cy="28" r="5" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>

  <!-- Wizard step indicator -->
  <rect x="24" y="56" width="472" height="32" rx="4" fill="#f5f5f5"/>
  <text x="40" y="76" fill="#007acc" font-size="12" font-family="system-ui" font-weight="600">✔ 许可协议</text>
  <text x="160" y="76" fill="#007acc" font-size="12" font-family="system-ui" font-weight="600">✔ 安装位置</text>
  <text x="280" y="76" fill="#333" font-size="12" font-family="system-ui" font-weight="600">● 选择附加任务</text>
  <text x="410" y="76" fill="#888" font-size="12" font-family="system-ui">安装</text>

  <!-- Content area -->
  <rect x="24" y="96" width="472" height="230" rx="4" fill="#fafafa"/>

  <text x="40" y="120" fill="#333" font-size="13" font-family="system-ui" font-weight="600">选择附加任务</text>
  <text x="40" y="142" fill="#888" font-size="11" font-family="system-ui">选择要在安装 Visual Studio Code 时执行的其他任务。</text>

  <!-- Checkbox items -->
  <rect x="40" y="160" width="18" height="18" rx="3" fill="#007acc"/>
  <text x="44" y="174" fill="#fff" font-size="11" font-weight="700">✓</text>
  <text x="66" y="174" fill="#333" font-size="12" font-family="system-ui">添加到上下文菜单（在文件资源管理器中打开）</text>

  <rect x="40" y="188" width="18" height="18" rx="3" fill="#007acc"/>
  <text x="44" y="202" fill="#fff" font-size="11" font-weight="700">✓</text>
  <text x="66" y="202" fill="#333" font-size="12" font-family="system-ui">将"code"命令注册到 PATH</text>

  <rect x="40" y="216" width="18" height="18" rx="3" fill="#007acc"/>
  <text x="44" y="230" fill="#fff" font-size="11" font-weight="700">✓</text>
  <text x="66" y="230" fill="#333" font-size="12" font-family="system-ui">添加到"Open with Code"动作</text>

  <!-- Highlight box -->
  <rect x="38" y="156" width="240" height="64" rx="4" fill="none" stroke="#ffbd2e" stroke-width="1.5" stroke-dasharray="4,3"/>

  <text x="200" y="270" fill="#d32f2f" font-size="11" font-family="system-ui" font-weight="600">⚠ 强烈建议勾选这三项</text>

  <!-- Install button -->
  <rect x="350" y="290" width="130" height="28" rx="4" fill="#007acc"/>
  <text x="415" y="309" text-anchor="middle" fill="#fff" font-size="12" font-family="system-ui" font-weight="600">安装</text>
  <rect x="270" y="290" width="68" height="28" rx="4" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>
  <text x="304" y="309" text-anchor="middle" fill="#555" font-size="12" font-family="system-ui">上一步</text>
  <rect x="486" y="290" width="8" height="28" fill="#fafafa"/>
  <rect x="24" y="326" width="472" height="1" fill="#eee"/>
  <text x="40" y="350" fill="#888" font-size="10" font-family="system-ui">版本 1.92.0 | 适用 Windows 10+ (x64/ARM64)</text>
  <text x="370" y="350" fill="#888" font-size="10" font-family="system-ui">Visual Studio Code 安装程序</text>
</svg>
