<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" fill="none">
  <rect width="600" height="380" rx="8" fill="#1e1e1e"/>

  <!-- Debug Sidebar -->
  <rect x="0" y="0" width="220" height="380" fill="#252526"/>
  <rect x="0" y="0" width="220" height="35" fill="#2d2d2d"/>
  <circle cx="16" cy="18" r="5" fill="#ff5f56" opacity="0.5"/>
  <circle cx="32" cy="18" r="5" fill="#ffbd2e" opacity="0.5"/>
  <circle cx="48" cy="18" r="5" fill="#27c93f" opacity="0.5"/>
  <text x="65" y="23" fill="#ddd" font-size="12" font-family="system-ui" font-weight="600">运行和调试</text>

  <!-- Variables Section -->
  <rect x="0" y="35" width="220" height="30" fill="#2d2d2d"/>
  <text x="10" y="54" fill="#888" font-size="11" font-family="system-ui" font-weight="600">变量</text>

  <g transform="translate(8, 70)" font-size="11" font-family="monospace">
    <text x="0" y="0" fill="#888">本地</text>
    <text x="36" y="0" fill="#d4d4d4">🟢</text>
    <text x="16" y="20" fill="#9cdcfe">count</text>
    <text x="64" y="20" fill="#6a9955">:</text>
    <text x="72" y="20" fill="#ce9178">number</text>
    <text x="104" y="20" fill="#d4d4d4">=</text>
    <text x="112" y="20" fill="#b5cea8">42</text>

    <text x="16" y="40" fill="#4ec9b0">items</text>
    <text x="64" y="40" fill="#6a9955">:</text>
    <text x="72" y="40" fill="#ce9178">Array(3)</text>
    <text x="124" y="40" fill="#d4d4d4">=</text>

    <text x="28" y="58" fill="#d4d4d4">0:</text>
    <text x="44" y="58" fill="#dcdcaa">"a"</text>
    <text x="28" y="74" fill="#d4d4d4">1:</text>
    <text x="44" y="74" fill="#dcdcaa">"b"</text>
    <text x="28" y="90" fill="#d4d4d4">2:</text>
    <text x="44" y="90" fill="#dcdcaa">"c"</text>

    <text x="16" y="112" fill="#9cdcfe">isLoading</text>
    <text x="96" y="112" fill="#d4d4d4">=</text>
    <text x="104" y="112" fill="#4fc1ff">false</text>
  </g>

  <!-- Watch Section -->
  <rect x="0" y="175" width="220" height="25" fill="#2d2d2d"/>
  <text x="10" y="192" fill="#888" font-size="11" font-family="system-ui" font-weight="600">监视</text>
  <g transform="translate(8, 205)" font-size="11" font-family="monospace">
    <text x="0" y="0" fill="#9cdcfe">typeof count</text>
    <text x="80" y="0" fill="#d4d4d4">→</text>
    <text x="92" y="0" fill="#ce9178">"number"</text>
    <text x="0" y="20" fill="#9cdcfe">items.length</text>
    <text x="80" y="20" fill="#d4d4d4">→</text>
    <text x="92" y="20" fill="#b5cea8">3</text>
  </g>

  <!-- Call Stack Section -->
  <rect x="0" y="245" width="220" height="25" fill="#2d2d2d"/>
  <text x="10" y="262" fill="#888" font-size="11" font-family="system-ui" font-weight="600">调用堆栈</text>
  <g transform="translate(8, 275)" font-size="11" font-family="monospace">
    <rect x="0" y="-4" width="204" height="22" rx="3" fill="#37373d"/>
    <text x="8" y="12" fill="#dcdcaa">handleClick</text>
    <text x="120" y="12" fill="#888" font-size="10">src/app.tsx:15</text>
    <text x="8" y="32" fill="#d4d4d4" opacity="0.7">renderApp</text>
    <text x="120" y="32" fill="#888" font-size="10" opacity="0.7">src/main.tsx:8</text>
  </g>

  <!-- Editor Area -->
  <rect x="220" y="0" width="380" height="380" fill="#1e1e1e"/>

  <!-- Debug Line Highlighting -->
  <rect x="220" y="80" width="380" height="20" fill="#264f78" opacity="0.5"/>

  <!-- Code with debug annotations -->
  <g transform="translate(236, 30)" font-family="monospace" font-size="11">
    <text x="0" y="12" fill="#858585">10</text>
    <text x="0" y="28" fill="#858585">11</text>
    <text x="0" y="44" fill="#858585">12</text>
    <text x="0" y="60" fill="#858585">13</text>
    <text x="0" y="76" fill="#858585">14</text>
    <text x="0" y="92" fill="#858585">15</text>
    <text x="0" y="108" fill="#858585">16</text>
    <text x="0" y="124" fill="#858585">17</text>
    <text x="0" y="140" fill="#858585">18</text>

    <text x="28" y="28" fill="#c586c0">function</text>
    <text x="84" y="28" fill="#dcdcaa">handleClick</text>
    <text x="156" y="28" fill="#d4d4d4">() {'{'}</text>

    <text x="52" y="44" fill="#c586c0">const</text>
    <text x="84" y="44" fill="#4ec9b0">newCount</text>
    <text x="148" y="44" fill="#d4d4d4">=</text>
    <text x="156" y="44" fill="#9cdcfe">count</text>
    <text x="188" y="44" fill="#d4d4d4">+</text>
    <text x="196" y="44" fill="#b5cea8">1</text>

    <!-- Breakpoint dot -->
    <circle cx="-12" cy="76" r="4" fill="#e51400"/>

    <text x="28" y="76" fill="#dcdcaa">setCount</text>
    <text x="76" y="76" fill="#d4d4d4">(</text>
    <text x="84" y="76" fill="#9cdcfe">newCount</text>
    <text x="148" y="76" fill="#d4d4d4">)</text>
    <!-- Inline value hint -->
    <rect x="160" y="69" width="44" height="15" rx="3" fill="#2d2d2d" stroke="#555" stroke-width="0.5"/>
    <text x="166" y="80" fill="#b5cea8" font-size="9">42</text>

    <text x="28" y="92" fill="#d4d4d4">}</text>
    <text x="28" y="108" fill="#d4d4d4">// ...</text>
  </g>

  <!-- Floating Inline Values -->
  <g transform="translate(420, 95)">
    <rect x="0" y="0" width="80" height="18" rx="3" fill="#2d2d2d" stroke="#555" stroke-width="0.5"/>
    <text x="6" y="13" fill="#888" font-size="10" font-family="system-ui">newCount = </text>
    <text x="52" y="13" fill="#b5cea8" font-size="10" font-family="monospace">43</text>
  </g>

  <!-- Debug Toolbar at top -->
  <g transform="translate(380, 6)">
    <rect x="0" y="0" width="112" height="26" rx="4" fill="#3c3c3c"/>
    <rect x="2" y="0" width="24" height="26" fill="#3c3c3c" rx="4"/>
    <rect x="30" y="2" width="20" height="22" rx="3" fill="#3c3c3c"/>
    <rect x="54" y="2" width="20" height="22" rx="3" fill="#0e639c"/>
    <rect x="78" y="2" width="20" height="22" rx="3" fill="#3c3c3c"/>
    <!-- Step icons -->
    <polygon points="12,8 18,13 12,18" fill="#ddd"/>
    <line x1="36" y1="8" x2="36" y2="18" stroke="#ddd" stroke-width="1.5"/>
    <line x1="42" y1="8" x2="42" y2="18" stroke="#ddd" stroke-width="1.5"/>
    <circle cx="63" cy="13" r="6" fill="#ddd" fill-opacity="0.3" stroke="#ddd" stroke-width="1.5"/>
    <polygon points="61,10 67,13 61,16" fill="#ddd"/>
    <polygon points="89,8 95,13 89,18" fill="#ddd"/>
  </g>
</svg>
